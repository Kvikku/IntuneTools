name: Release

on:
  push:
    tags:
      - '*.*.*.*'   # matches version tags like 1.4.0.0

  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.4.0.0)'
        required: true

permissions:
  contents: write        # needed to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, ARM64]

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
          } else {
            $ver = "${{ github.ref_name }}"
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained app
        run: >
          dotnet publish
          --configuration Release
          --runtime win-${{ matrix.platform == 'x64' && 'x64' || 'arm64' }}
          --self-contained true
          -p:Platform=${{ matrix.platform }}
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:WindowsAppSDKSelfContained=true
          -p:PublishReadyToRun=false
          -p:PublishTrimmed=false

      - name: Create zip archive
        shell: pwsh
        run: |
          $rid = if ("${{ matrix.platform }}" -eq "x64") { "win-x64" } else { "win-arm64" }
          $publishDir = "bin\Release\net8.0-windows10.0.22621.0\$rid\publish"
          $zipName = "IntuneTools_${{ steps.version.outputs.VERSION }}_${{ matrix.platform }}.zip"
          Compress-Archive -Path "$publishDir\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
        id: zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: IntuneTools-${{ matrix.platform }}
          path: ${{ steps.zip.outputs.ZIP_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          draft: true
          generate_release_notes: true
          files: artifacts/**/*.zip
