name: Release

on:
  push:
    tags:
      - '*.*.*.*'   # matches version tags like 1.4.0.0

  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.4.0.0). Leave empty to auto-increment patch.'
        required: false

permissions:
  contents: write        # needed to create releases and upload assets
  id-token: write        # needed for build provenance attestation
  attestations: write    # needed for build provenance attestation

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.version }}" -ne "") {
            $ver = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.event_name }}" -eq "push") {
            $ver = "${{ github.ref_name }}"
          } else {
            # Auto-increment: read current version from csproj and bump patch
            $csproj = Get-Content IntuneTools.csproj -Raw
            if ($csproj -match '<Version>(\d+)\.(\d+)\.(\d+)\.(\d+)</Version>') {
              $major = [int]$Matches[1]
              $minor = [int]$Matches[2]
              $patch = [int]$Matches[3] + 1
              $build = [int]$Matches[4]
              $ver = "$major.$minor.$patch.$build"
            } else {
              Write-Error "Could not read version from IntuneTools.csproj"
              exit 1
            }
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      - name: Update version in project files
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          # Update IntuneTools.csproj
          $csproj = Get-Content IntuneTools.csproj -Raw
          $csproj = $csproj -replace '<Version>[^<]+</Version>', "<Version>$ver</Version>"
          Set-Content IntuneTools.csproj $csproj -NoNewline
          # Update Package.appxmanifest
          $manifest = Get-Content Package.appxmanifest -Raw
          $manifest = $manifest -replace '(Identity[^>]*Version=")[^"]+(")', "`${1}$ver`${2}"
          Set-Content Package.appxmanifest $manifest -NoNewline

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore test project
        run: dotnet restore IntuneTools.Tests/IntuneTools.Tests.csproj -p:Platform=x64

      - name: Build tests
        run: dotnet build IntuneTools.Tests/IntuneTools.Tests.csproj --no-restore --configuration Release -p:Platform=x64

      - name: Run tests
        run: dotnet test IntuneTools.Tests/IntuneTools.Tests.csproj --no-build --configuration Release -p:Platform=x64 --verbosity normal

      - name: Publish self-contained app
        run: >
          dotnet publish IntuneTools.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:Platform=x64
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:WindowsAppSDKSelfContained=true
          -p:PublishReadyToRun=false
          -p:PublishTrimmed=false

      - name: Create zip archive
        shell: pwsh
        run: |
          $publishDir = "bin\x64\Release\net8.0-windows10.0.22621.0\win-x64\publish"
          $zipName = "IntuneTools_${{ steps.version.outputs.VERSION }}_x64.zip"
          Compress-Archive -Path "$publishDir\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
        id: zip

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: IntuneTools-x64
          path: ${{ steps.zip.outputs.ZIP_NAME }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ steps.zip.outputs.ZIP_NAME }}

      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add IntuneTools.csproj Package.appxmanifest
          git diff --cached --quiet && echo "No version changes to commit" && exit 0
          git commit -m "Bump version to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:master

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ needs.build.outputs.version }}" \
            -f target_commitish="master" \
            --jq '.body')
          {
            echo "BODY<<EOF"
            echo "$NOTES"
            echo ""
            echo "## Download"
            echo ""
            echo "As always, the app and this new update is available on the [Microsoft Store](https://apps.microsoft.com/detail/9phqrcx3gkxd)."
            echo ""
            echo "## Manual install"
            echo "If you prefer to install manually and not use the store, I've attached a zip of the packaged version of the app. Install the root certificate and run the install.ps1 to install it."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          draft: true
          body: ${{ steps.notes.outputs.BODY }}
          files: artifacts/**/*.zip
